# Stack IAM: políticas administradas para despliegue CloudFormation y ejecución Lambda (APIP).
# Alineado con apip-service: recursos fijos por cuenta (apip-core, apip-api, stacks apip-data, etc.).
#
# Despliegue (requiere CAPABILITY_NAMED_IAM):
#   aws cloudformation deploy \
#     --stack-name apip-iam-policies \
#     --template-file accounts/aws-apip-dev/service-policies.yml \
#     --capabilities CAPABILITY_NAMED_IAM
#
# Después: service-roles.yml. ARNs de políticas:
#   arn:aws:iam::<AccountId>:policy/AWSAPIPCloudFormationExecutionPolicy
#   arn:aws:iam::<AccountId>:policy/AWSAPIPLambdaExecutionPolicy
# Detalle: ../../doc/AWSAPIP-service-iam-policies.md

AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  APIP - Políticas AWSAPIPCloudFormationExecutionPolicy y AWSAPIPLambdaExecutionPolicy
  (contenido alineado con apip-service CloudFormation stacks; una cuenta por entorno).

Resources:
  AWSAPIPDeployExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPDeployExecutionPolicy
      Description: >-
        Rol de despliegue (GitHub Actions OIDC): desplegar apip-policies y apip-service (CloudFormation + artefactos).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationDeploy
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:GetTemplateSummary
              - cloudformation:TagResource
              - cloudformation:UntagResource
              - cloudformation:ListExports
            Resource:
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-*/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*'

          # Permite que el deploy pase el rol de ejecución de CloudFormation.
          - Sid: PassCloudFormationExecutionRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIPCloudFormationExecutionRole'
            Condition:
              StringEqualsIfExists:
                iam:PassedToService: cloudformation.amazonaws.com

          # Bootstrap/controlado: permitir crear/actualizar políticas y roles AWSAPIP* (apip-policies).
          - Sid: IamManagedPoliciesAWSAPIP
            Effect: Allow
            Action:
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:TagPolicy
              - iam:UntagPolicy
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/AWSAPIP*'

          - Sid: IamRolesAWSAPIP
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:TagRole
              - iam:UntagRole
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIP*'

          - Sid: S3ArtifactsUpload
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:PutObjectTagging
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: arn:aws:s3:::*/*

          - Sid: CloudFrontInvalidationsOptional
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource: '*'

          - Sid: ReadIdentity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  AWSAPIPCloudFormationExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPCloudFormationExecutionPolicy
      Description: >-
        Despliegue de stacks apip-data, apip-messaging, apip-artifacts y apip-api
        (DynamoDB, EventBridge, S3, IAM rol Lambda, Lambda, API Gateway HTTP v2).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationStacks
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:GetTemplateSummary
              - cloudformation:TagResource
              - cloudformation:UntagResource
              - cloudformation:ListStackSets
              - cloudformation:UpdateTerminationProtection
            Resource:
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-data/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-messaging/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-artifacts/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-api/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*'

          - Sid: DynamoDBForDataStack
            Effect: Allow
            Action:
              - dynamodb:CreateTable
              - dynamodb:DeleteTable
              - dynamodb:DescribeTable
              - dynamodb:UpdateTable
              - dynamodb:DescribeContinuousBackups
              - dynamodb:UpdateContinuousBackups
              - dynamodb:TagResource
              - dynamodb:UntagResource
              - dynamodb:ListTagsOfResource
              - dynamodb:DescribeTimeToLive
              - dynamodb:UpdateTimeToLive
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core/index/*'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-audit'

          - Sid: EventBridgeMessagingStack
            Effect: Allow
            Action:
              - events:CreateEventBus
              - events:DeleteEventBus
              - events:DescribeEventBus
              - events:ListTagsForResource
              - events:TagResource
              - events:UntagResource
            Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/apip-domain'

          - Sid: S3ArtifactsStack
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:HeadBucket
              - s3:GetBucketLocation
              - s3:GetBucketVersioning
              - s3:PutBucketVersioning
              - s3:GetEncryptionConfiguration
              - s3:PutEncryptionConfiguration
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketTagging
              - s3:PutBucketTagging
            Resource: arn:aws:s3:::*

          - Sid: S3LambdaCodeRead
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: arn:aws:s3:::*/*

          - Sid: IamLambdaExecutionRole
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:PassRole
              - iam:GetPolicy
              - iam:GetPolicyVersion
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIPLambdaExecutionRole'
              - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            Condition:
              StringEqualsIfExists:
                iam:PassedToService: lambda.amazonaws.com

          - Sid: LambdaApiStack
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:GetPolicy
              - lambda:TagResource
              - lambda:UntagResource
              - lambda:ListTags
              - lambda:PublishVersion
            Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:apip-api'

          - Sid: ApiGatewayV2HttpApi
            Effect: Allow
            Action:
              - apigateway:GET
              - apigateway:POST
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
            Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/*'

          - Sid: CloudWatchLogsForLambdaManagement
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - logs:TagLogGroup
              - logs:UntagLogGroup
              - logs:ListTagsLogGroup
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/apip-api:*'

          - Sid: CloudFormationExportsRead
            Effect: Allow
            Action:
              - cloudformation:ListExports
              - cloudformation:DescribeStacks
            Resource: '*'

  AWSAPIPLambdaExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPLambdaExecutionPolicy
      Description: >-
        Ejecución Lambda apip-api: DynamoDB core/audit, PutEvents al bus de dominio
        y logs (duplicado tolerable si también se adjunta AWSLambdaBasicExecutionRole).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DynamoDBCoreTable
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:BatchWriteItem
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core/index/*'

          - Sid: DynamoDBAuditTable
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:Query
            Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-audit'

          - Sid: EventBridgePutEvents
            Effect: Allow
            Action:
              - events:PutEvents
            Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/apip-domain'

          - Sid: CloudWatchLogsLambda
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/apip-api:*'

# Stack IAM: políticas administradas para despliegue CloudFormation y ejecución Lambda (APIP).
# Alineado con apip-service: recursos fijos por cuenta (apip-core, apip-api, stacks apip-data, etc.).
#
# Despliegue (requiere CAPABILITY_NAMED_IAM):
#   aws cloudformation deploy \
#     --stack-name apip-iam-policies \
#     --template-file accounts/aws-apip-dev/service-policies.yml \
#     --capabilities CAPABILITY_NAMED_IAM
#
# Después: service-roles.yml. ARNs de políticas:
#   arn:aws:iam::<AccountId>:policy/AWSAPIPCloudFormationExecutionPolicy
#   arn:aws:iam::<AccountId>:policy/AWSAPIPLambdaExecutionPolicy
# Detalle: ../../doc/AWSAPIP-service-iam-policies.md

AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  APIP managed policies AWSAPIPCloudFormationExecutionPolicy and AWSAPIPLambdaExecutionPolicy
  (aligned with apip-service CloudFormation stacks; one account per environment).

Resources:
  AWSAPIPDeployExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPDeployExecutionPolicy
      Description: >-
        Rol de despliegue (GitHub Actions OIDC): desplegar apip-policies y apip-service (CloudFormation + artefactos).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationDeploy
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:GetTemplateSummary
              - cloudformation:TagResource
              - cloudformation:UntagResource
              - cloudformation:ListExports
            Resource:
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-*/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*'

          # Permite que el deploy pase el rol de ejecución de CloudFormation.
          - Sid: PassCloudFormationExecutionRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIPCloudFormationExecutionRole'
            Condition:
              StringEqualsIfExists:
                iam:PassedToService: cloudformation.amazonaws.com

          # Bootstrap/controlado: permitir crear/actualizar políticas y roles AWSAPIP* (apip-policies).
          - Sid: IamManagedPoliciesAWSAPIP
            Effect: Allow
            Action:
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:TagPolicy
              - iam:UntagPolicy
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/AWSAPIP*'

          - Sid: IamRolesAWSAPIP
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:UpdateRoleDescription
              - iam:UpdateAssumeRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:TagRole
              - iam:UntagRole
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIP*'

          - Sid: S3ArtifactsUpload
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:PutObject
              - s3:PutObjectTagging
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:DeleteObject
            Resource:
              - arn:aws:s3:::*
              - arn:aws:s3:::*/*

          - Sid: CloudFrontInvalidationsOptional
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource: '*'

          - Sid: ReadIdentity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  AWSAPIPCloudFormationExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPCloudFormationExecutionPolicy
      Description: >-
        Despliegue de stacks apip-data, apip-messaging, apip-artifacts y apip-api (DynamoDB, EventBridge, S3, IAM rol Lambda, Lambda, API Gateway HTTP v2).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationStacks
            Effect: Allow
            Action:
              - cloudformation:*Stack*
              - cloudformation:*ChangeSet*
              - cloudformation:*Template*
              - cloudformation:*StackSet*
              - cloudformation:*TerminationProtection*
            Resource:
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-data/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-messaging/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-artifacts/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-cognito/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-api/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-audit-ingest/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/apip-website/*'
              - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*'

          - Sid: CognitoUserPoolStack
            Effect: Allow
            Action:
              - cognito-idp:*UserPool
              - cognito-idp:SetUserPoolMfaConfig
              - cognito-idp:*UserPoolClient
              - cognito-idp:CreateGroup
              - cognito-idp:DeleteGroup
              - cognito-idp:GetGroup
              - cognito-idp:UpdateGroup
              - cognito-idp:ListGroups
              - cognito-idp:TagResource
              - cognito-idp:UntagResource
            Resource:
              - !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'

          - Sid: DynamoDBForDataStack
            Effect: Allow
            Action:
              - dynamodb:*Table*
              - dynamodb:*ContinuousBackups*
              - dynamodb:*TimeToLive*
              - dynamodb:TagResource
              - dynamodb:UntagResource
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core/index/*'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-audit'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-access-roles'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-user-profiles'

          - Sid: EventBridgeRulesOnDefaultBus
            Effect: Allow
            Action:
              - events:*Rule
              - events:PutTargets
              - events:RemoveTargets
              - events:ListTargetsByRule
              - events:ListTagsForResource
              - events:TagResource
              - events:UntagResource
            Resource:
              - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'
              - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/apip-audit-ingest'

          - Sid: EventBridgeMessagingStack
            Effect: Allow
            Action:
              - events:*EventBus
              - events:ListTagsForResource
              - events:TagResource
              - events:UntagResource
            Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/apip-domain'

          - Sid: S3ArtifactsStack
            Effect: Allow
            Action:
              - s3:*Bucket
              - s3:*BucketPolicy
              - s3:GetBucketLocation
              - s3:GetBucketVersioning
              - s3:PutBucketVersioning
              - s3:GetEncryptionConfiguration
              - s3:PutEncryptionConfiguration
              - s3:GetBucketOwnershipControls
              - s3:PutBucketOwnershipControls
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketTagging
              - s3:PutBucketTagging
            Resource: arn:aws:s3:::*

          # s3:*Bucket no incluye PutBucketCORS (el sufijo es CORS). Buckets físicos del stack apip-api (p. ej. documentos).
          - Sid: S3ApipApiStackBucketCors
            Effect: Allow
            Action:
              - s3:PutBucketCORS
              - s3:GetBucketCORS
              - s3:DeleteBucketCORS
            Resource: !Sub 'arn:aws:s3:::apip-api-*'

          - Sid: CloudFrontWebsiteStack
            Effect: Allow
            Action:
              - cloudfront:*Distribution
              - cloudfront:GetDistributionConfig
              - cloudfront:TagResource
              - cloudfront:UntagResource
              - cloudfront:CreateOriginAccessControl
              - cloudfront:GetOriginAccessControl
              - cloudfront:UpdateOriginAccessControl
              - cloudfront:DeleteOriginAccessControl
              - cloudfront:ListTagsForResource
              - cloudfront:CreateFunction
              - cloudfront:UpdateFunction
              - cloudfront:DeleteFunction
              - cloudfront:DescribeFunction
              - cloudfront:ListFunctions
              - cloudfront:PublishFunction
              - cloudfront:TestFunction
            Resource: '*'

          - Sid: S3LambdaCodeRead
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: arn:aws:s3:::*/*

          - Sid: IamLambdaExecutionRole
            Effect: Allow
            Action:
              - iam:*Role
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:GetPolicy
              - iam:GetPolicyVersion
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/AWSAPIPLambdaExecutionRole'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/apip-audit-ingest-lambda'
              - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            Condition:
              StringEqualsIfExists:
                iam:PassedToService: lambda.amazonaws.com

          # Required by API Gateway when creating custom domains (creates AWSServiceRoleForAPIGateway).
          - Sid: IamCreateServiceLinkedRoleForApiGateway
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ops.apigateway.amazonaws.com/AWSServiceRoleForAPIGateway'
            Condition:
              StringEquals:
                iam:AWSServiceName: ops.apigateway.amazonaws.com

          - Sid: LambdaApiStack
            Effect: Allow
            Action:
              - lambda:*Function
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:GetPolicy
              - lambda:TagResource
              - lambda:UntagResource
              - lambda:ListTags
              - lambda:PublishVersion
            Resource:
              - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:apip-api'
              - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:apip-audit-ingest'

          - Sid: ApiGatewayV2HttpApi
            Effect: Allow
            Action:
              - apigateway:GET
              - apigateway:POST
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
              - apigateway:TagResource
              - apigateway:UntagResource
            Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/*'

          - Sid: CloudWatchLogsForLambdaManagement
            Effect: Allow
            Action:
              - logs:*LogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - logs:TagLogGroup
              - logs:UntagLogGroup
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/apip-api:*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/apip-audit-ingest:*'

          - Sid: CloudFormationExportsRead
            Effect: Allow
            Action:
              - cloudformation:ListExports
              - cloudformation:DescribeStacks
            Resource: '*'

  AWSAPIPLambdaExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AWSAPIPLambdaExecutionPolicy
      Description: >-
        Lambda apip-api execution: DynamoDB core/audit, PutEvents to domain bus and logs
        (duplicate acceptable if AWSLambdaBasicExecutionRole is also attached).
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DynamoDBCoreTable
            Effect: Allow
            Action:
              - dynamodb:*Item
              - dynamodb:Query
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-core/index/*'

          - Sid: DynamoDBAccessRolesAndUserProfiles
            Effect: Allow
            Action:
              - dynamodb:*Item
              - dynamodb:Query
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-access-roles'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-user-profiles'

          - Sid: DynamoDBAuditTable
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:Query
            Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/apip-audit'

          - Sid: EventBridgePutEvents
            Effect: Allow
            Action:
              - events:PutEvents
            Resource:
              - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/apip-domain'
              - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'

          # Alta de usuarios desde Lambda (admin plataforma): AdminCreateUser + resolución por email (AdminGetUser).
          - Sid: CognitoAdminUsersForApiLambda
            Effect: Allow
            Action:
              - cognito-idp:AdminCreateUser
              - cognito-idp:AdminGetUser
              - cognito-idp:AdminSetUserPassword
              - cognito-idp:AdminUpdateUserAttributes
            Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'

          - Sid: CloudWatchLogsLambda
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/apip-api:*'
